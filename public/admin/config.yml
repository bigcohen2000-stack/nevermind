backend:
  name: github
  repo: bigcohen2000-stack/nevermind
  branch: main
  base_url: https://nevermind-9dr.pages.dev/api
  auth_endpoint: /auth
  auth_scope: repo
  site_domain: www.nevermind.co.il

site_url: https://www.nevermind.co.il
logo_url: /favicon.svg
locale: he
publish_mode: simple
media_folder: public/uploads
public_folder: /uploads
show_preview_links: false

slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false
  frame: false
  wysiwyg: true

collections:
  - name: articles
    label: מאמרים
    label_singular: מאמר
    folder: src/content/articles
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    preview_path: articles/{{slug}}
    summary: "{{title}}"
    sortable_fields:
      - pubDate
      - updatedDate
      - title
    view_filters:
      - label: טיוטות
        field: draft
        pattern: true
      - label: מוכן לפרסום
        field: draft
        pattern: false
    fields:
      - label: כותרת
        name: title
        widget: string
      - label: תיאור קצר
        name: description
        widget: text
        hint: "תוצג בתוצאות חיפוש ובמטא-תיאור. עד 160 תווים."
      - label: תאריך פרסום
        name: pubDate
        widget: datetime
        required: true
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "התאריך שהמאמר פורסם במקור או כרצונך שיופיע בפרסום."
      - label: תאריך עדכון
        name: updatedDate
        widget: datetime
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "עדכן אם ערכת את המאמר לאחר הפרסום הראשוני."
      - label: מחבר
        name: author
        widget: string
        default: "השם לא משנה"
        hint: "שם האדם או הגוף שנכתב על ידו המאמר. השווה ל-שם המהדר אם שונה מהמאמר המקורי."
      - label: תגיות
        name: tags
        widget: select
        multiple: true
        hint: "בחר 2-5 תגיות המתארות את ההדרים המרכזיים של המאמר. זה עוזר קוראים למצוא מאמרים קשורים."
        options:
          - חופש
          - מכניקת מחשבה
          - העצמי
          - בהירות
          - בחירה
          - זוגיות
          - משפחה וחינוך
          - פילוסופיה וחברה
          - תודעה ורצון
          - חשיבה ביקורתית
          - שאלות גדולות
          - רגשות
          - ניסויי מחשבה
      - label: רמת עומק
        name: difficultyLevel
        widget: select
        required: false
        hint: "מתחילים = מציגים בסיס, מתקדמים = דורשים בסיס, עומק = תיאוריה מורכבת וטקים"
        options:
          - { label: מתחילים, value: beginner }
          - { label: מתקדמים, value: advanced }
          - { label: עומק, value: deep }
      - label: עוצמת שינוי תפיסתי (1-5)
        name: mindShiftIntensity
        widget: number
        required: false
        value_type: int
        min: 1
        max: 5
        step: 1
        hint: "1 = הרחבה קטנה בחשיבה, 5 = היפוך מיסודי של הבנה עולם. כיצד המאמר משנה את תפיסת הקורא?"
      - label: תובנת ליבה
        name: originalInsight
        widget: text
        required: false
        hint: "מה הרעיון המרכזי שהקורא יישא עמו? המשפט שישנה את דרך חשיבתו. סמן את זה בחיזוק בטקסט."
      - label: שאלה לחידוד סכמה (SEO)
        name: questionForSchema
        widget: string
        required: false
        hint: "שאלה משמעותית שהקורא יעלה בעקבות הקריאה. תופיע בתוצאות חיפוש AI (Perplexity, ChatGPT Search)."
      - label: תיאור קונספט לתמונה
        name: imageAlt
        widget: string
        required: false
        hint: "לא רק מה מופיע בפריים - מה הרעיון שהתמונה נושאת (למשל מראה שבורה כמטאפורה לפירוק האגו). עברית. חיזוק הקשר סמנטי לחיפוש."
      - label: תמונה ראשית
        name: image
        widget: image
        required: false
        default: /og.jpg
        media_library:
          config:
            multiple: false
      - label: כתובת קנונית
        name: canonicalUrl
        widget: string
        required: false
        hint: "קישור מוחלט למקום המקורי של המאמר אם פורסם במקום אחר קודם (למשל מדיום). השאר ריק אם המאמר חדש בפלטפורמה."
      - label: מילות מפתח
        name: keywords
        widget: string
        required: false
        hint: "5 מילות מפתח בעברית המתארות את ההדר המרכזי של המאמר. יפריד בפסיקים."
      - label: קישור לאודיו
        name: audioUrl
        widget: string
        required: false
        hint: "קישור ישיר לקובץ אודיו (MP3/M4A). השאר ריק אם אין אודיו."
      - label: מזהה יוטיוב
        name: youtubeId
        widget: string
        required: false
        hint: "המזהה של הסרטון מ-YouTube (החלק אחרי v= בכתובת). למשל: dQw4w9WgXcQ"
      - label: קישור ל-Tally
        name: tallyUrl
        widget: string
        required: false
        hint: "קישור לטופס Tally לאיסוף משוב. עזוב בריק אם לא רציתך איסוף משוב."
      - label: תוכן פרימיום
        name: isPremium
        widget: boolean
        default: false
        hint: "אם זה מופעל, הקורא יצטרך הרשמה לראות את המאמר."
      - label: טיוטה
        name: draft
        widget: boolean
        default: true
        hint: "אם זה מופעל, המאמר לא יופיע בפרסום. בטל כשהמאמר מוכן לפרסום."
      - label: שאלות נפוצות
        name: faq
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.question}}"
        fields:
          - label: שאלה
            name: question
            widget: string
          - label: תשובה
            name: answer
            widget: text
      - label: תוכן המאמר
        name: body
        widget: markdown
        modes:
          - raw
          - rich_text
        editor_components:
          - image
          - code-block
          - link
        hint: "כתב בעברית טבעית וברורה. השתמש בנושאי משנה (#), דגשים, וקבלות אומץ לקריאה טובה. הימנע מטקסט טכני או חזר על טקסטים."

