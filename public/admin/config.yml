backend:
  name: github
  repo: bigcohen2000-stack/nevermind
  branch: main
  base_url: https://nevermind-9dr.pages.dev/api
  auth_endpoint: /auth
  auth_scope: repo
  site_domain: www.nevermind.co.il

site_url: https://www.nevermind.co.il
logo_url: /favicon.svg
locale: he
publish_mode: simple
media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false

collections:
  - name: articles
    label: מאמרים
    label_singular: מאמר
    folder: src/content/articles
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    preview_path: articles/{{slug}}
    summary: "{{title}}"
    sortable_fields:
      - pubDate
      - updatedDate
      - title
    view_filters:
      - label: טיוטות
        field: draft
        pattern: true
      - label: מוכן לפרסום
        field: draft
        pattern: false
    fields:
      - label: כותרת
        name: title
        widget: string
      - label: תיאור קצר
        name: description
        widget: text
      - label: תאריך פרסום
        name: pubDate
        widget: datetime
        required: true
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: תאריך עדכון
        name: updatedDate
        widget: datetime
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: מחבר
        name: author
        widget: string
        default: "השם לא משנה"
      - label: תגיות
        name: tags
        widget: select
        multiple: true
        options:
          - חופש
          - מכניקת מחשבה
          - העצמי
          - בהירות
          - בחירה
          - זוגיות
          - משפחה וחינוך
          - פילוסופיה וחברה
          - תודעה ורצון
          - חשיבה ביקורתית
          - שאלות גדולות
          - רגשות
          - ניסויי מחשבה
      - label: רמת עומק (MDX)
        name: difficultyLevel
        widget: select
        required: false
        options:
          - { label: מתחילים, value: beginner }
          - { label: מתקדמים, value: advanced }
          - { label: עומק, value: deep }
      - label: עוצמת שינוי תפיסתי (1–5)
        name: mindShiftIntensity
        widget: number
        required: false
        value_type: int
        min: 1
        max: 5
        step: 1
      - label: תובנת ליבה (originalInsight)
        name: originalInsight
        widget: text
        required: false
      - label: שאלה לסכמת TruthBlock / SEO (questionForSchema)
        name: questionForSchema
        widget: string
        required: false
      - label: תיאור קונספט לתמונה (imageAlt)
        name: imageAlt
        widget: string
        required: false
        hint: "לא רק מה מופיע בפריים — מה הרעיון שהתמונה נושאת (למשל מראה שבורה כמטאפורה לפירוק האגו). עברית. חיזוק הקשר סמנטי לחיפוש."
      - label: תמונה ראשית
        name: image
        widget: image
        required: false
        default: /og.jpg
        media_library:
          config:
            multiple: false
      - label: כתובת קנונית
        name: canonicalUrl
        widget: string
        required: false
      - label: מילות מפתח
        name: keywords
        widget: string
        required: false
      - label: קישור לאודיו
        name: audioUrl
        widget: string
        required: false
      - label: מזהה יוטיוב
        name: youtubeId
        widget: string
        required: false
      - label: קישור ל-Tally
        name: tallyUrl
        widget: string
        required: false
      - label: תוכן פרימיום
        name: isPremium
        widget: boolean
        default: false
      - label: טיוטה
        name: draft
        widget: boolean
        default: true
      - label: שאלות נפוצות
        name: faq
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.question}}"
        fields:
          - label: שאלה
            name: question
            widget: string
          - label: תשובה
            name: answer
            widget: text
      - label: תוכן המאמר
        name: body
        widget: markdown
        modes:
          - raw
          - rich_text
        editor_components:
          - image
          - code-block
          - link

