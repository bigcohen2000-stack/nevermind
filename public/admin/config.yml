backend:
  name: github
  repo: bigcohen2000-stack/nevermind
  branch: main
  base_url: https://nevermind-9dr.pages.dev/api
  auth_endpoint: auth
  auth_scope: repo
  site_domain: nevermind-9dr.pages.dev

site_url: https://nevermind-9dr.pages.dev
logo_url: /favicon.svg
locale: he
publish_mode: simple
media_folder: public/uploads
public_folder: /uploads


slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false

collections:
  - name: articles
    label: מאמרים
    label_singular: מאמר
    folder: src/content/articles
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    preview_path: articles/{{slug}}
    summary: "{{title}}"
    sortable_fields:
      - pubDate
      - updatedDate
      - title
    view_filters:
      - label: טיוטות
        field: draft
        pattern: true
      - label: מוכן לפרסום
        field: draft
        pattern: false
    fields:
      - label: כותרת
        name: title
        widget: string
      - label: תיאור קצר
        name: description
        widget: text
      - label: תאריך פרסום
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: תאריך עדכון
        name: updatedDate
        widget: datetime
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: מחבר
        name: author
        widget: string
        default: "השם לא משנה"
      - label: תגיות
        name: tags
        widget: select
        multiple: true
        options:
          - חופש
          - מכניקת מחשבה
          - העצמי
          - בהירות
          - בחירה
      - label: תמונה ראשית
        name: image
        widget: image
        required: false
        default: /og.jpg
      - label: Canonical URL
        name: canonicalUrl
        widget: string
        required: false
      - label: Keywords
        name: keywords
        widget: string
        required: false
      - label: Audio URL
        name: audioUrl
        widget: string
        required: false
      - label: YouTube ID
        name: youtubeId
        widget: string
        required: false
      - label: Tally URL
        name: tallyUrl
        widget: string
        required: false
      - label: Premium
        name: isPremium
        widget: boolean
        default: false
      - label: Draft
        name: draft
        widget: boolean
        default: true
      - label: שאלות נפוצות
        name: faq
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.question}}"
        fields:
          - label: שאלה
            name: question
            widget: string
          - label: תשובה
            name: answer
            widget: text
      - label: תוכן המאמר
        name: body
        widget: markdown
        modes:
          - raw
          - rich_text
        editor_components:
          - image
          - code-block
          - link
