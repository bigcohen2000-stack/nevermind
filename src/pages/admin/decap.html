<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeverMind CMS</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://unpkg.com" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Assistant", system-ui, sans-serif;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f9f8f6;
        direction: rtl;
      }

      #nc-root,
      #nc-root * {
        font-family: "Assistant", system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
    <script>
      const AUTH_STORAGE_KEY = "decap-cms-oauth-result";

      function relayStoredAuth() {
        const message = window.localStorage.getItem(AUTH_STORAGE_KEY);
        if (!message) return;

        let attempts = 0;
        const relay = () => {
          attempts += 1;
          window.postMessage(message, window.location.origin);

          if (attempts >= 6) {
            window.localStorage.removeItem(AUTH_STORAGE_KEY);
            return;
          }

          window.setTimeout(relay, 250);
        };

        relay();
      }

      window.addEventListener("storage", (event) => {
        if (event.key === AUTH_STORAGE_KEY && event.newValue) {
          relayStoredAuth();
        }
      });

      CMS.registerEditorComponent({
        id: "inquiry-box",
        label: "InquiryBox",
        fields: [
          { name: "title", label: "כותרת", widget: "string", default: "חקירה פתוחה" },
          { name: "content", label: "תוכן", widget: "text" },
        ],
        pattern: /^<InquiryBox\s+title="([^"]+)">\s*([\s\S]*?)\s*<\/InquiryBox>$/m,
        fromBlock(match) {
          return {
            title: match[1],
            content: match[2].trim(),
          };
        },
        toBlock(data) {
          return `<InquiryBox title="${data.title}">\n${data.content || ""}\n</InquiryBox>`;
        },
        toPreview(data) {
          return `
            <div style="border:1px solid rgba(26,26,26,.12);border-radius:20px;padding:16px;background:#fffaf5;direction:rtl;">
              <div style="font-weight:700;margin-bottom:8px;">${data.title || "חקירה פתוחה"}</div>
              <div>${(data.content || "").replace(/\n/g, "<br>")}</div>
            </div>
          `;
        },
      });

      CMS.init();
      window.setTimeout(relayStoredAuth, 300);
    </script>
  </body>
</html>
